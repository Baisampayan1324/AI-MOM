<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Meeting Minutes - Standalone</title>
    <link rel="stylesheet" href="slider.css">
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #0a0a0f 0%, #141420 100%);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }
        
        .standalone-container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: var(--shadow-xl);
            border: 1px solid var(--border-primary);
        }
        
        .standalone-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .standalone-title {
            font-size: 2.5rem;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }
        
        .standalone-subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }
        
        .extension-frame {
            width: 100%;
            height: 800px;
            border: none;
            border-radius: var(--radius-md);
            background: var(--bg-tertiary);
        }
        
        .environment-info {
            background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            color: white;
            padding: 1rem;
            border-radius: var(--radius-md);
            margin-bottom: 1.5rem;
            text-align: center;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="standalone-container">
        <div class="standalone-header">
            <h1 class="standalone-title">🎙️ AI Meeting Minutes</h1>
            <p class="standalone-subtitle">Full-featured recording in unrestricted environment</p>
        </div>
        
        <div class="environment-info">
            ✅ Recording available in this tab - all microphone features enabled
        </div>
        
        <iframe 
            src="slider.html" 
            class="extension-frame"
            title="AI Meeting Minutes Extension">
        </iframe>
    </div>

    <script>
        // Listen for messages from the iframe
        window.addEventListener('message', (event) => {
            if (event.data.action === 'closeSidebar') {
                // In standalone mode, just close the tab
                window.close();
            }
        });
        
        console.log('✅ AI Meeting Minutes standalone mode loaded');
    </script>
</body>
</html>
